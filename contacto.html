<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contáctanos - Tienda online con los mejores productos. Envíos a todo el país.">
    <meta name="keywords" content="contacto, tienda, productos, ecommerce, compras online">
    <title>Contacto - Mi Tienda Online</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- CDN Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body data-page="contacto">
    <!-- Header se cargará dinámicamente -->

    <main class="contact-page">
        <div class="contact-grid">

            <!-- Columna Formulario -->
            <div class="contact-container">
                <h1>Contáctanos</h1>
                <p class="contact-intro">
                    ¿Tienes alguna pregunta o consulta? Completa el formulario y te responderemos a través de WhatsApp
                    lo antes posible.
                </p>

                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <label for="contactName">Nombre *</label>
                        <input type="text" id="contactName" name="nombre" placeholder="Tu nombre completo" required>
                    </div>

                    <div class="form-group">
                        <label for="contactMessage">Mensaje *</label>
                        <textarea id="contactMessage" name="mensaje" placeholder="Escribe tu consulta aquí..." required
                            rows="6"></textarea>
                    </div>

                    <button type="submit" class="submit-contact-btn">
                        <span>Enviar por WhatsApp</span>
                        <span>📱</span>
                    </button>
                </form>
            </div>

            <!-- Columna Mapa -->
            <div class="contact-map-container">
                <h2><i class="fa-solid fa-location-dot"></i> Nuestra Ubicación</h2>
                <div class="contact-map">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1702.3531941344952!2d-64.18891627807622!3d-31.42221464897834!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9432a3002b1d71e9%3A0x673a61661f05e8ff!2sEdificio%20inteligente!5e0!3m2!1ses!2sar!4v1775362819600!5m2!1ses!2sar"
                        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div class="contact-address">
                    <p><i class="fa-solid fa-map-pin"></i> Boulevard San Juan, Obispo Trejo &, Córdoba</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer se cargará dinámicamente -->

    <script src="js/template.js"></script>
    <script src="js/marquee.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/contacto-form.js"></script>
</body>

</html>
