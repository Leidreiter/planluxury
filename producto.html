<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tienda online con los mejores productos. Envíos a todo el país.">
    <meta name="keywords" content="tienda, productos, ecommerce, compras online">
    <title>Mi Tienda Online - Productos de Calidad</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- Favicon -->
    <link rel="icon" href="img/lemora.svg" type="image/svg+xml">

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://tusitio.com/producto.html">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tusitio.com/producto.html">
    <meta property="og:title" content="Detalle de Producto - Mi Tienda Online">
    <meta property="og:description" content="Conocé más sobre nuestros productos de calidad. Envíos a todo el país.">
    <meta property="og:image" content="https://tusitio.com/img/imagen-preview.jpg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://tusitio.com/producto.html">
    <meta name="twitter:title" content="Detalle de Producto - Mi Tienda Online">
    <meta name="twitter:description" content="Conocé más sobre nuestros productos de calidad. Envíos a todo el país.">
    <meta name="twitter:image" content="https://tusitio.com/img/imagen-preview.jpg">

    <!-- CDN Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"/>
</head>
<body data-page="producto">
    <div class="header-placeholder"></div>
    <!-- Header se cargará dinámicamente -->

    <main class="product-detail-page">
        <div class="breadcrumb">
            <a href="index.html">Inicio</a>
            <span>/</span>
            <a href="index.html#productos">Productos</a>
            <span>/</span>
            <span id="breadcrumbProduct">Producto</span>
        </div>

        <div class="product-detail-container" id="productDetailContainer">
            <!-- El contenido se cargará dinámicamente -->
        </div>

        <section class="related-products">
            <h2>Productos Relacionados</h2>
            <div class="products-grid" id="relatedProducts">
                <!-- Productos relacionados se cargarán aquí -->
            </div>
        </section>
    </main>

    <!-- Footer se cargará dinámicamente -->

    <script src="js/template.js" defer type="module"></script>
    <script src="js/menu.js" defer></script>
    <script src="js/salida-popup.js" defer></script>
    <script src="js/productos.js" defer type="module"></script>
    <script src="js/carrito.js" defer type="module"></script>
    <script src="js/producto-detalle.js" defer type="module"></script>
</body>
</html>
